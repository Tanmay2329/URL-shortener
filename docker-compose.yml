version: "3.9"

services:
  backend:
    build: .
    container_name: url-backend
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    environment:
      - PORT=3000
      - BASE_URL=http://localhost:3000
      - DB_URL=postgresql://postgres:password@postgres:5432/urlshortener
      - REDIS_URL=redis://redis:6379

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: urlshortener
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

volumes:
  pgdata: